// ── SUPABASE API ──
async function sbFetch(path,opts={}){
  const headers={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+(currentUser?.access_token||SB_KEY),...(opts.headers||{})};
  const r=await fetch(SB_URL+path,{...opts,headers});
  if(!r.ok){const e=await r.text();throw new Error(e);}
  const txt=await r.text();
  return txt?JSON.parse(txt):null;
}

// ── AUTH FUNCTIONS ──
async function sbSignUp(email,password,name){
  const d=await sbFetch('/auth/v1/signup',{method:'POST',body:JSON.stringify({email,password,data:{name}})});
  return d;
}
async function sbSignIn(email,password){
  const d=await sbFetch('/auth/v1/token?grant_type=password',{method:'POST',body:JSON.stringify({email,password})});
  return d;
}
async function sbSignOut(){
  try{await sbFetch('/auth/v1/logout',{method:'POST'});}catch(e){}
  currentUser=null;
  localStorage.removeItem('sb_session');
}
async function sbGetUser(token){
  const r=await fetch(SB_URL+'/auth/v1/user',{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+token}});
  if(!r.ok)return null;
  return r.json();
}
async function sbRefreshToken(refresh_token){
  try{
    const d=await sbFetch('/auth/v1/token?grant_type=refresh_token',{method:'POST',body:JSON.stringify({refresh_token})});
    return d;
  }catch(e){return null;}
}

// ── CLOUD SYNC ──
async function cloudSave(){
  if(!currentUser)return;
  const payload={
    data:S.data, weights:S.weights, custom_db:S.customDB,
    my_supps:S.mySupps, analyses:S.analyses,
    user_profile:S.userProfile, ai_plan:S.aiPlan,
    updated_at:new Date().toISOString()
  };
  try{
    await sbFetch('/rest/v1/diary_data?user_id=eq.'+currentUser.id,{
      method:'PATCH',
      headers:{'Prefer':'return=minimal'},
      body:JSON.stringify(payload)
    });
  }catch(e){console.error('Cloud save error:',e);}
}

async function cloudLoad(){
  if(!currentUser)return false;
  try{
    const rows=await sbFetch('/rest/v1/diary_data?user_id=eq.'+currentUser.id+'&select=*');
    if(rows&&rows.length>0){
      const d=rows[0];
      if(d.data)S.data=d.data;
      if(d.weights)S.weights=d.weights;
      if(d.custom_db)S.customDB=d.custom_db;
      if(d.my_supps)S.mySupps=d.my_supps;
      if(d.analyses)S.analyses=d.analyses;
      if(d.user_profile)S.userProfile=d.user_profile;
      if(d.ai_plan)S.aiPlan=d.ai_plan;
      // Restore WT from AI plan
      if(S.aiPlan&&S.aiPlan.schedule){
        Object.entries(S.aiPlan.schedule).forEach(([day,info])=>{
          if(info.exercises&&info.exercises.length>0){
            const key=`${info.name} (${day})`;
            WT[key]=info.exercises.map(e=>e.split('—')[0].split(' — ')[0].trim());
          }
        });
      }
      return true;
    }
  }catch(e){console.error('Cloud load error:',e);}
  return false;
}

// Автосохранение с задержкой (debounce)
function scheduleSave(){
  if(syncTimeout)clearTimeout(syncTimeout);
  syncTimeout=setTimeout(()=>{
    save(); // локально
    cloudSave(); // в облако
  },1500);
}

// ── SESSION MANAGEMENT ──
async function initAuth(){
  // Проверяем сохранённую сессию
  try{
    const sess=localStorage.getItem('sb_session');
    if(sess){
      const s=JSON.parse(sess);
      // Проверяем не истёк ли токен
      const exp=s.expires_at*1000;
      if(Date.now()<exp-60000){
        // Токен ещё действителен
        currentUser={...s.user,access_token:s.access_token,refresh_token:s.refresh_token,id:s.user.id};
        return true;
      } else {
        // Обновляем токен
        const refreshed=await sbRefreshToken(s.refresh_token);
        if(refreshed&&refreshed.access_token){
          localStorage.setItem('sb_session',JSON.stringify(refreshed));
          currentUser={...refreshed.user,access_token:refreshed.access_token,refresh_token:refreshed.refresh_token,id:refreshed.user.id};
          return true;
        }
      }
    }
  }catch(e){console.error('Auth init error:',e);}
  return false;
}

function getWeekDates(off){const now=new Date();const dow=now.getDay()===0?6:now.getDay()-1;const mon=new Date(now);mon.setDate(now.getDate()-dow+off*7);return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d.toISOString().split('T')[0];});}
function recalc(e){return{...e,totalCalories:Math.round(e.foods.reduce((s,f)=>s+f.calories,0)),totalProtein:Math.round(e.foods.reduce((s,f)=>s+f.protein,0)*10)/10,totalFat:Math.round(e.foods.reduce((s,f)=>s+(f.fat||0),0)*10)/10,totalCarbs:Math.round(e.foods.reduce((s,f)=>s+(f.carbs||0),0)*10)/10};}
function searchFood(q){
  if(!q||q.length<2)return[];
  const lq=q.toLowerCase();
  // Используем Supabase базу если загружена, иначе встроенную
  const dbSource=S.foodsDB&&S.foodsDB.length>0
    ? S.foodsDB.map(f=>[f.name,f.calories,f.protein,f.fat,f.carbs,f.avg_weight,false])
    : BUILTIN_DB;
  const all=[...dbSource,...S.customDB.map(p=>[p.name,p.cal,p.prot,p.fat||0,p.carbs||0,p.avg||null,true])];
  return all.filter(([n])=>n.toLowerCase().includes(lq))
    .sort((a,b)=>(a[0].toLowerCase().startsWith(lq)?0:1)-(b[0].toLowerCase().startsWith(lq)?0:1))
    .slice(0,10);
}

async function loadExercisesDB(){
  try{
    const r=await fetch(SB_URL+'/rest/v1/exercises?is_public=eq.true&order=name&select=*',{
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
    });
    if(r.ok){
      const data=await r.json();
      if(data&&data.length>0){
        S.exercisesDB=data;
        try{localStorage.setItem('fit-exercises-db',JSON.stringify(data));}catch(e){}
        console.log('Exercises loaded from Supabase:',data.length);
      }
    }
  }catch(e){
    try{
      const cached=localStorage.getItem('fit-exercises-db');
      if(cached)S.exercisesDB=JSON.parse(cached);
    }catch(e2){}
    console.warn('Exercises DB load failed, using builtin');
  }
}

const GUEST_KEY='fit-guest-v1';
function isGuest(){try{const g=localStorage.getItem(GUEST_KEY);if(!g)return false;const d=JSON.parse(g);return Date.now()<d.expires;}catch(e){return false;}}

async function aiCall(messages, maxTokens=600){
  const key=getAIKey();
  if(!key) throw new Error('NO_KEY');
  const controller=new AbortController();
  const timer=setTimeout(()=>controller.abort(),20000);
  try{
    const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      signal:controller.signal,
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({
        model:'llama-3.3-70b-versatile',
        max_tokens:maxTokens,
        messages
      })
    });
    clearTimeout(timer);
    if(!r.ok){const e=await r.text();throw new Error(e);}
    const d=await r.json();
    return d.choices?.[0]?.message?.content||'';
  }catch(e){
    clearTimeout(timer);
    if(e.name==='AbortError')throw new Error('TIMEOUT');
    throw e;
  }
}

async function analyzeLabel(b64){
  const key=getAIKey();
  if(!key) throw new Error('NO_KEY');
  // DeepSeek Vision
  const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
    body:JSON.stringify({
      model:'llama-3.3-70b-versatile',
      max_tokens:300,
      messages:[{role:'user',content:[
        {type:'image_url',image_url:{url:'data:image/jpeg;base64,'+b64}},
        {type:'text',text:'Прочитай этикетку продукта. На 100г: калории, белки, жиры, углеводы. Ответь ТОЛЬКО JSON без markdown: {"name":"название","calories":123,"protein":12,"fat":5,"carbs":10}'}
      ]}]
    })
  });
  const d=await r.json();
  const txt=d.choices?.[0]?.message?.content||'{}';
  return JSON.parse(txt.replace(/```json|```/g,'').trim());
}

const ALL_EXERCISES = Object.values(EX_LIBRARY).flat();

function openWM(w){
  S.workoutModal={
    editing:w||null,
    mode: w ? (w.customMode||'plan') : 'plan', // 'plan' | 'custom'
    form:w?{type:w.type||'Грудь + Трицепс',notes:w.notes||'',duration:w.duration||'60',pulse:w.pulse||'',name:w.name||''}
          :{type:'Грудь + Трицепс',notes:'',duration:'60',pulse:'',name:''},
    customExercises: w&&w.customExercises ? [...w.customExercises] : [],
    exSearch: '',
    exCategory: Object.keys(EX_LIBRARY)[0],
  };
  buildWorkoutModal();
}

function buildWorkoutModal(){
  const existing=document.getElementById('workout-modal-overlay');
  if(existing)existing.remove();

  const wm=S.workoutModal, f=wm.form;

  const overlay=document.createElement('div');
  overlay.id='workout-modal-overlay';
  overlay.className='modal-overlay';
  overlay.addEventListener('click',e=>{if(e.target===overlay){S.workoutModal=null;overlay.remove();render();}});

  const box=document.createElement('div');
  box.className='modal-box';
  box.addEventListener('click',e=>e.stopPropagation());
  overlay.appendChild(box);
  document.body.appendChild(overlay);

  function rebuild(){
    box.innerHTML='';

    // ── Header ──
    const hdr=document.createElement('div');hdr.className='modal-hdr';
    const title=document.createElement('div');title.className='modal-title';
    title.textContent=wm.editing?'✏️ Тренировка':'🏋️ Добавить тренировку';
    const closeBtn=document.createElement('button');closeBtn.className='modal-close';closeBtn.textContent='×';
    closeBtn.onclick=()=>{S.workoutModal=null;overlay.remove();render();};
    hdr.appendChild(title);hdr.appendChild(closeBtn);box.appendChild(hdr);

    // ── Mode switcher ──
    const ms=document.createElement('div');
    ms.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px';
    ['plan','custom'].forEach(mode=>{
      const btn=document.createElement('button');
      const isActive=wm.mode===mode;
      btn.style.cssText=`padding:10px 8px;border-radius:10px;border:2px solid ${isActive?'var(--accent)':'var(--border)'};background:${isActive?'var(--accent-light)':'var(--bg)'};color:${isActive?'var(--accent)':'var(--muted)'};font-size:13px;font-weight:${isActive?'700':'400'};cursor:pointer;font-family:inherit`;
      btn.textContent=mode==='plan'?'📋 По плану':'✍️ Своя тренировка';
      btn.onclick=()=>{wm.mode=mode;rebuild();};
      ms.appendChild(btn);
    });
    box.appendChild(ms);

    // ── Duration + Pulse (always shown) ──
    const row2=document.createElement('div');row2.className='f2';
    const durInp=document.createElement('input');durInp.className='field-inp';durInp.type='number';durInp.placeholder='60';durInp.value=f.duration;
    durInp.oninput=e=>f.duration=e.target.value;
    const pulseInp=document.createElement('input');pulseInp.className='field-inp';pulseInp.type='number';pulseInp.placeholder='110';pulseInp.value=f.pulse;
    pulseInp.oninput=e=>f.pulse=e.target.value;
    const df1=document.createElement('div');df1.className='field';
    df1.appendChild(Object.assign(document.createElement('div'),{className:'field-lbl',textContent:'ДЛИТЕЛЬНОСТЬ (МИН)'}));
    df1.appendChild(durInp);
    const df2=document.createElement('div');df2.className='field';
    df2.appendChild(Object.assign(document.createElement('div'),{className:'field-lbl',textContent:'ПУЛЬС (УД/МИН)'}));
    df2.appendChild(pulseInp);
    row2.appendChild(df1);row2.appendChild(df2);box.appendChild(row2);

    // ── Notes ──
    const notesInp=document.createElement('input');notesInp.className='field-inp';notesInp.type='text';notesInp.placeholder='Как прошло?';notesInp.value=f.notes;
    notesInp.oninput=e=>f.notes=e.target.value;
    const nf=document.createElement('div');nf.className='field';
    nf.appendChild(Object.assign(document.createElement('div'),{className:'field-lbl',textContent:'ЗАМЕТКИ'}));
    nf.appendChild(notesInp);
    box.appendChild(nf);

    if(wm.mode==='plan'){
      // ── Plan mode: select template ──
      const typeDiv=document.createElement('div');typeDiv.className='field';
      typeDiv.appendChild(Object.assign(document.createElement('div'),{className:'field-lbl',textContent:'ПРОГРАММА'}));
      const typeSel=document.createElement('select');typeSel.className='field-sel';
      Object.keys(WT).forEach(k=>{
        const o=document.createElement('option');o.value=k;o.textContent=k;
        if(k===f.type)o.selected=true;typeSel.appendChild(o);
      });
      typeSel.onchange=e=>{f.type=e.target.value;rebuild();};
      typeDiv.appendChild(typeSel);box.appendChild(typeDiv);

      // Exercise list
      if(WT[f.type]){
        const el=document.createElement('div');
        el.style.cssText='background:var(--bg);border-radius:9px;padding:9px 11px';
        const elTitle=document.createElement('div');
        elTitle.style.cssText='font-size:10px;color:var(--sub);font-weight:700;margin-bottom:6px';
        elTitle.textContent='УПРАЖНЕНИЯ ПЛАНА:';el.appendChild(elTitle);
        WT[f.type].forEach(ex=>{
          const row=document.createElement('div');
          row.style.cssText='display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--border)';
          const imgUrl=EX_IMGS[ex];
          if(imgUrl){const img=document.createElement('img');img.src=imgUrl;img.style.cssText='width:30px;height:30px;border-radius:5px;object-fit:cover;flex-shrink:0';img.onerror=()=>img.remove();row.appendChild(img);}
          else{const ph=document.createElement('div');ph.style.cssText='width:30px;height:30px;border-radius:5px;background:var(--accent-light);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0';ph.textContent=exE(ex);row.appendChild(ph);}
          const nm=document.createElement('span');nm.style.fontSize='12px';nm.textContent=ex;row.appendChild(nm);
          el.appendChild(row);
        });
        box.appendChild(el);
      }

    } else {
      // ── Custom mode ──

      // Workout name
      const nameDiv=document.createElement('div');nameDiv.className='field';
      nameDiv.appendChild(Object.assign(document.createElement('div'),{className:'field-lbl',textContent:'НАЗВАНИЕ ТРЕНИРОВКИ (НЕОБЯЗАТЕЛЬНО)'}));
      const nameInp=document.createElement('input');nameInp.className='field-inp';nameInp.type='text';
      nameInp.placeholder='Например: Ноги и пресс';nameInp.value=f.name||'';
      nameInp.oninput=e=>f.name=e.target.value;
      nameDiv.appendChild(nameInp);box.appendChild(nameDiv);

      // Selected exercises
      if(wm.customExercises.length>0){
        const selTitle=document.createElement('div');
        selTitle.style.cssText='font-size:11px;color:var(--green);font-weight:700;margin-bottom:6px';
        selTitle.textContent='✅ ВЫБРАНО: '+wm.customExercises.length+' упражнений';
        box.appendChild(selTitle);
        const selList=document.createElement('div');
        selList.style.cssText='background:var(--green-light);border-radius:9px;padding:8px 10px;margin-bottom:12px;border:1px solid #bbf7d0';
        wm.customExercises.forEach((ex,i)=>{
          const row=document.createElement('div');
          row.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid rgba(0,0,0,.05)';
          const nm=document.createElement('span');nm.style.cssText='font-size:13px;color:var(--text)';nm.textContent=(i+1)+'. '+ex;
          const del=document.createElement('button');
          del.style.cssText='background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;padding:0 4px';
          del.textContent='×';del.onclick=()=>{wm.customExercises.splice(i,1);rebuild();};
          row.appendChild(nm);row.appendChild(del);selList.appendChild(row);
        });
        box.appendChild(selList);
      }

      // Search bar
      const searchDiv=document.createElement('div');searchDiv.className='field';
      searchDiv.appendChild(Object.assign(document.createElement('div'),{className:'field-lbl',textContent:'ПОИСК УПРАЖНЕНИЯ'}));
      const searchInp=document.createElement('input');searchInp.className='field-inp';
      searchInp.type='text';searchInp.placeholder='Жим, тяга, приседания...';
      searchInp.value=wm.exSearch;
      searchInp.oninput=e=>{wm.exSearch=e.target.value;updateExList();};
      searchDiv.appendChild(searchInp);box.appendChild(searchDiv);

      // Category tabs
      const catWrap=document.createElement('div');
      catWrap.style.cssText='display:flex;gap:6px;overflow-x:auto;margin-bottom:10px;padding-bottom:2px';
      catWrap.style.cssText+='scrollbar-width:none';
      Object.keys(EX_LIBRARY).forEach(cat=>{
        const btn=document.createElement('button');
        const isAct=wm.exCategory===cat;
        btn.style.cssText=`flex-shrink:0;padding:6px 10px;border-radius:16px;border:1.5px solid ${isAct?'var(--accent)':'var(--border)'};background:${isAct?'var(--accent)':'var(--bg)'};color:${isAct?'#fff':'var(--sub)'};font-size:11px;font-weight:${isAct?'700':'400'};cursor:pointer;font-family:inherit;white-space:nowrap`;
        btn.textContent=cat;
        btn.onclick=()=>{wm.exCategory=cat;searchInp.value='';wm.exSearch='';updateExList();
          // update category buttons
          catWrap.querySelectorAll('button').forEach(b=>{
            const active=b.textContent===cat;
            b.style.background=active?'var(--accent)':'var(--bg)';
            b.style.color=active?'#fff':'var(--sub)';
            b.style.borderColor=active?'var(--accent)':'var(--border)';
            b.style.fontWeight=active?'700':'400';
          });
        };
        catWrap.appendChild(btn);
      });
      box.appendChild(catWrap);

      // Exercise list container
      const exListContainer=document.createElement('div');
      exListContainer.style.cssText='background:var(--bg);border-radius:9px;overflow:hidden;margin-bottom:10px;max-height:260px;overflow-y:auto';
      box.appendChild(exListContainer);

      function updateExList(){
        exListContainer.innerHTML='';
        const q=wm.exSearch.toLowerCase().trim();
        const exercises = q
          ? ALL_EXERCISES.filter(ex=>ex.toLowerCase().includes(q))
          : EX_LIBRARY[wm.exCategory]||[];

        if(!exercises.length){
          const empty=document.createElement('div');
          empty.style.cssText='padding:16px;text-align:center;color:var(--muted);font-size:13px';
          empty.textContent='Ничего не найдено';
          exListContainer.appendChild(empty);return;
        }

        exercises.forEach(ex=>{
          const alreadyAdded=wm.customExercises.includes(ex);
          const row=document.createElement('div');
          row.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:9px 12px;border-bottom:1px solid var(--border);cursor:pointer';
          if(alreadyAdded)row.style.background='rgba(22,163,74,.06)';

          const nm=document.createElement('span');nm.style.cssText='font-size:13px;color:var(--text)';
          nm.textContent=ex;row.appendChild(nm);

          const addBtn=document.createElement('button');
          addBtn.style.cssText=`border:none;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;background:${alreadyAdded?'var(--green-light)':'var(--accent-light)'};color:${alreadyAdded?'var(--green)':'var(--accent)'}`;
          addBtn.textContent=alreadyAdded?'✓':'+ Добавить';
          addBtn.onclick=e=>{
            e.stopPropagation();
            if(!alreadyAdded){wm.customExercises.push(ex);}
            else{wm.customExercises=wm.customExercises.filter(x=>x!==ex);}
            rebuild();
          };
          row.appendChild(addBtn);
          row.onclick=()=>{
            if(!alreadyAdded)wm.customExercises.push(ex);
            else wm.customExercises=wm.customExercises.filter(x=>x!==ex);
            rebuild();
          };
          exListContainer.appendChild(row);
        });
      }
      updateExList();
    }

    // ── Save button ──
    const saveBtn=document.createElement('button');
    saveBtn.className='modal-save';
    saveBtn.textContent='Сохранить';
    saveBtn.onclick=()=>{
      const te=S.te;
      const isCustom=wm.mode==='custom';
      const workoutData={
        ...f,
        customMode: wm.mode,
        customExercises: isCustom ? wm.customExercises : [],
        exercises: wm.editing ? (wm.editing.exercises||{}) : {},
        // For custom: use name or generated title, for plan: use type
        type: isCustom ? (f.name||'Своя тренировка') : f.type,
      };
      if(wm.editing) te.workouts=te.workouts.map(w=>w.id===wm.editing.id?{...w,...workoutData}:w);
      else te.workouts.push({id:Date.now(),...workoutData});
      save();S.workoutModal=null;overlay.remove();render();
    };
    box.appendChild(saveBtn);
  }

  rebuild();
}

function rWorkoutModal(){return null;}

function openAIAnalysis(){
  const existing=document.getElementById('ai-analysis-overlay');
  if(existing)existing.remove();

  const te=S.te, p=S.data.profile;
  const tw=S.weights.find(x=>x.date===ad());

  const overlay=document.createElement('div');
  overlay.id='ai-analysis-overlay';
  overlay.className='modal-overlay';
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});

  const box=document.createElement('div');
  box.className='modal-box';
  box.addEventListener('click',e=>e.stopPropagation());

  // Header
  const hdr=document.createElement('div');hdr.className='modal-hdr';
  const title=document.createElement('div');title.className='modal-title';
  title.textContent='🤖 AI Анализ дня';
  const closeBtn=document.createElement('button');closeBtn.className='modal-close';closeBtn.textContent='×';
  closeBtn.onclick=()=>overlay.remove();
  hdr.appendChild(title);hdr.appendChild(closeBtn);box.appendChild(hdr);

  // Loading state
  const body=document.createElement('div');
  body.style.cssText='min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:20px 0';
  const spinner=document.createElement('div');
  spinner.style.cssText='width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite';
  const spinStyle=document.createElement('style');
  spinStyle.textContent='@keyframes spin{to{transform:rotate(360deg)}}';
  document.head.appendChild(spinStyle);
  const loadTxt=document.createElement('div');
  loadTxt.style.cssText='font-size:14px;color:var(--sub);text-align:center';
  loadTxt.textContent='Анализирую твой день...';
  body.appendChild(spinner);body.appendChild(loadTxt);
  box.appendChild(body);
  overlay.appendChild(box);
  document.body.appendChild(overlay);

  // Build prompt
  const foodList=te.foods.length
    ? te.foods.map(f=>`- ${f.name} ${f.weight}г (${f.calories}ккал, Б${f.protein}г, Ж${f.fat||0}г, У${f.carbs||0}г)`).join('\n')
    : 'Питание не записано';

  const workoutList=te.workouts.length
    ? te.workouts.map(w=>{
        const exList=w.customMode==='custom'?(w.customExercises||[]):(WT[w.type]||[]);
        const sets=Object.entries(w.exercises||{}).map(([ex,sets])=>
          ex+': '+sets.map(s=>s.weight?(s.weight+'кг×'+s.reps+'повт'):(s.reps+'повт')).join(', ')
        ).join('; ');
        return `- ${w.type} ${w.duration}мин пульс ${w.pulse||'—'}${exList.length?' ('+exList.slice(0,4).join(', ')+(exList.length>4?'...':'')+')':''}${sets?' ['+sets+']':''}`;
      }).join('\n')
    : 'Тренировки не записаны';

  const prompt=`Ты персональный тренер и диетолог. Проанализируй день пользователя и дай конкретные, полезные комментарии на русском языке.

ПРОФИЛЬ:
- Вес: ${tw?tw.kg+' кг':'не указан'} (цель: рекомпозиция тела)
- Рост: 175 см
- Цели: калории ${p.calorieGoal}ккал, белок ${p.proteinGoal}г, жиры ${p.fatGoal||70}г, углеводы ${p.carbGoal||200}г
- Здоровье: искусственный аортальный клапан, коксартроз тазобедренных суставов

ПИТАНИЕ ЗА ДЕНЬ:
${foodList}
Итого: ${te.totalCalories}ккал | Б:${te.totalProtein}г | Ж:${te.totalFat||0}г | У:${te.totalCarbs||0}г

ТРЕНИРОВКИ:
${workoutList}

Дай анализ в формате:
📊 ПИТАНИЕ — что хорошо, что улучшить, хватает ли белка, баланс макросов
💪 ТРЕНИРОВКА — оценка нагрузки, пульс, подходы
⚠️ РЕКОМЕНДАЦИИ — 2-3 конкретных совета на завтра
👍 МОЛОДЕЦ — что сделал правильно сегодня

Пиши коротко и конкретно, без воды. Учитывай проблемы со здоровьем (сердце, суставы).`;

  aiCall([{role:'user',content:prompt}], 800)
  .then(text=>{
    if(!text){throw new Error('empty');}

    body.innerHTML='';
    body.style.cssText='padding:4px 0';

    // Format response — split by emoji sections
    const sections=text.split(/(?=📊|💪|⚠️|👍)/g).filter(s=>s.trim());
    sections.forEach(section=>{
      const card=document.createElement('div');
      card.style.cssText='background:var(--bg);border-radius:10px;padding:12px 14px;margin-bottom:10px;border-left:3px solid var(--accent)';
      if(section.startsWith('📊'))card.style.borderColor='var(--orange)';
      else if(section.startsWith('💪'))card.style.borderColor='var(--green)';
      else if(section.startsWith('⚠️'))card.style.borderColor='var(--yellow)';
      else if(section.startsWith('👍'))card.style.borderColor='var(--teal)';
      const lines=section.trim().split('\n');
      const titleLine=document.createElement('div');
      titleLine.style.cssText='font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px';
      titleLine.textContent=lines[0];
      card.appendChild(titleLine);
      if(lines.length>1){
        const rest=document.createElement('div');
        rest.style.cssText='font-size:13px;color:var(--sub);line-height:1.6;white-space:pre-wrap';
        rest.textContent=lines.slice(1).join('\n').trim();
        card.appendChild(rest);
      }
      body.appendChild(card);
    });
    if(!sections.length){
      const raw=document.createElement('div');
      raw.style.cssText='font-size:13px;color:var(--text);line-height:1.7;white-space:pre-wrap;padding:8px 0';
      raw.textContent=text;body.appendChild(raw);
    }
    const closeBottom=document.createElement('button');
    closeBottom.className='modal-save';closeBottom.textContent='Закрыть';
    closeBottom.style.background='var(--header)';
    closeBottom.onclick=()=>overlay.remove();
    body.appendChild(closeBottom);
  })
  .catch(err=>{
    body.innerHTML='';body.style.cssText='padding:20px;text-align:center';
    const isNoKey=err.message==='NO_KEY';
    const errIcon=document.createElement('div');errIcon.style.fontSize='36px';errIcon.textContent=isNoKey?'🔑':'😔';
    const errMsg=document.createElement('div');
    errMsg.style.cssText='font-size:14px;color:var(--red);margin-top:10px;margin-bottom:8px;font-weight:600';
    errMsg.textContent=isNoKey?'Введи Groq API ключ':'Не удалось получить анализ';
    const errHint=document.createElement('div');
    errHint.style.cssText='font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:12px';
    errHint.textContent=isNoKey
      ?'Зарегистрируйся на console.groq.com → API Keys → Create API Key. Полностью бесплатно. 1000 запросов в день.'
      :'Проверь правильность ключа или интернет-соединение.';
    const settingsBtn=document.createElement('button');
    settingsBtn.className='modal-save';settingsBtn.style.marginBottom='8px';
    settingsBtn.textContent='⚙️ Ввести API ключ';
    settingsBtn.onclick=()=>{overlay.remove();openAISettings();};
    const closeB=document.createElement('button');
    closeB.style.cssText='width:100%;padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:11px;color:var(--text);font-size:14px;cursor:pointer;font-family:inherit';
    closeB.textContent='Закрыть';closeB.onclick=()=>overlay.remove();
    body.appendChild(errIcon);body.appendChild(errMsg);body.appendChild(errHint);body.appendChild(settingsBtn);body.appendChild(closeB);
  });
}

function rSupps(){
  const frag=document.createDocumentFragment();
  const td=today();

  // ── Мои добавки (активные) ──
  const activeSupps=S.mySupps.filter(s=>s.active!==false);

  if(activeSupps.length>0){
    const hdr=document.createElement('div');hdr.className='section-header';
    const t=document.createElement('div');t.className='section-title';t.textContent='✅ Мои добавки';
    hdr.appendChild(t);frag.appendChild(hdr);

    activeSupps.forEach(supp=>{
      const takenToday=supp.taken&&supp.taken[td];
      const card=document.createElement('div');
      card.style.cssText=`background:${takenToday?'var(--green-light)':'var(--card)'};border:1.5px solid ${takenToday?'#bbf7d0':'var(--border)'};border-radius:12px;padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow)`;

      const row=document.createElement('div');row.style.cssText='display:flex;align-items:center;gap:10px';

      // Check button
      const checkBtn=document.createElement('button');
      checkBtn.style.cssText=`width:36px;height:36px;border-radius:50%;border:2px solid ${takenToday?'var(--green)':'var(--border)'};background:${takenToday?'var(--green)':'transparent'};color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center`;
      checkBtn.textContent=takenToday?'✓':'';
      checkBtn.onclick=()=>{
        if(!supp.taken)supp.taken={};
        supp.taken[td]=!takenToday;
        saveSupps();render();
      };

      const info=document.createElement('div');info.style.flex='1';
      const name=document.createElement('div');name.style.cssText='font-size:14px;font-weight:600;color:var(--text)';name.textContent=supp.name;
      const dose=document.createElement('div');dose.style.cssText='font-size:12px;color:var(--sub);margin-top:2px';
      dose.textContent=(supp.dose||'')+(supp.times&&supp.times.length?' · '+supp.times.join(', '):'');
      info.appendChild(name);info.appendChild(dose);

      const acts=document.createElement('div');acts.style.cssText='display:flex;gap:5px';
      const editBtn=document.createElement('button');editBtn.className='icon-btn';editBtn.style.cssText='background:var(--accent-light);color:var(--accent)';editBtn.textContent='✏️';
      editBtn.onclick=()=>openSuppModal(supp);
      const delBtn=document.createElement('button');delBtn.className='icon-btn';delBtn.style.cssText='background:var(--red-light);color:var(--red)';delBtn.textContent='×';
      delBtn.onclick=()=>{S.mySupps=S.mySupps.filter(x=>x.id!==supp.id);saveSupps();render();};

      acts.appendChild(editBtn);acts.appendChild(delBtn);
      row.appendChild(checkBtn);row.appendChild(info);row.appendChild(acts);
      card.appendChild(row);
      if(supp.notes){const nt=document.createElement('div');nt.style.cssText='font-size:11px;color:var(--muted);margin-top:6px;font-style:italic;padding-left:46px';nt.textContent=supp.notes;card.appendChild(nt);}
      frag.appendChild(card);
    });

    // Progress bar for today
    const taken=activeSupps.filter(s=>s.taken&&s.taken[td]).length;
    const pct=Math.round(taken/activeSupps.length*100);
    const prog=document.createElement('div');
    prog.style.cssText='background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:16px;box-shadow:var(--shadow)';
    prog.innerHTML=`<div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:13px;font-weight:600">Принято сегодня</span><span style="font-size:13px;font-weight:700;color:var(--green)">${taken}/${activeSupps.length}</span></div><div style="background:var(--bg);border-radius:5px;height:8px;overflow:hidden"><div style="width:${pct}%;height:100%;background:var(--green);border-radius:5px;transition:width .5s"></div></div>`;
    frag.insertBefore(prog,frag.firstChild);
  }

  // ── Add button ──
  const addHdr=document.createElement('div');addHdr.className='section-header';
  const at=document.createElement('div');at.className='section-title';at.textContent='Добавить добавку';
  const addBtn2=document.createElement('button');addBtn2.className='add-btn';addBtn2.textContent='+ Добавить';
  addBtn2.onclick=()=>openSuppModal(null);
  addHdr.appendChild(at);addHdr.appendChild(addBtn2);frag.appendChild(addHdr);

  // ── Search in DB ──
  const searchWrap=document.createElement('div');searchWrap.className='field';
  const searchLbl=document.createElement('div');searchLbl.className='field-lbl';searchLbl.textContent='ПОИСК В БАЗЕ ДОБАВОК';
  const searchInp=document.createElement('input');searchInp.className='field-inp';searchInp.placeholder='Витамин D, Магний, Омега...';
  searchInp.oninput=e=>{
    const q=e.target.value.toLowerCase();
    listContainer.innerHTML='';
    const results=q.length>1?SUPP_DB.filter(([n])=>n.toLowerCase().includes(q)):[];
    renderSuppList(results,listContainer);
  };
  searchWrap.appendChild(searchLbl);searchWrap.appendChild(searchInp);frag.appendChild(searchWrap);

  // Category filter
  const catWrap=document.createElement('div');catWrap.style.cssText='display:flex;gap:6px;overflow-x:auto;margin-bottom:10px';
  const listContainer=document.createElement('div');

  let activeCat=SUPP_CATS[0];
  function renderCats(){
    catWrap.innerHTML='';
    SUPP_CATS.forEach(cat=>{
      const btn=document.createElement('button');
      const isA=cat===activeCat;
      btn.style.cssText=`flex-shrink:0;padding:5px 10px;border-radius:14px;border:1.5px solid ${isA?'var(--accent)':'var(--border)'};background:${isA?'var(--accent)':'var(--bg)'};color:${isA?'#fff':'var(--sub)'};font-size:11px;font-weight:${isA?'700':'400'};cursor:pointer;font-family:inherit;white-space:nowrap`;
      btn.textContent=cat;
      btn.onclick=()=>{activeCat=cat;searchInp.value='';renderCats();renderSuppList(SUPP_DB.filter(s=>s[1]===cat),listContainer);};
      catWrap.appendChild(btn);
    });
  }
  renderCats();
  renderSuppList(SUPP_DB.filter(s=>s[1]===activeCat),listContainer);
  frag.appendChild(catWrap);frag.appendChild(listContainer);

  function renderSuppList(items,container){
    container.innerHTML='';
    if(!items.length){const e=document.createElement('div');e.style.cssText='text-align:center;padding:16px;color:var(--muted);font-size:13px';e.textContent='Ничего не найдено';container.appendChild(e);return;}
    items.forEach(([name,cat,desc,dose])=>{
      const already=S.mySupps.some(s=>s.name===name);
      const row=document.createElement('div');
      row.style.cssText=`background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;box-shadow:var(--shadow)`;
      const left=document.createElement('div');left.style.flex='1';
      const nm=document.createElement('div');nm.style.cssText='font-size:13px;font-weight:600;color:var(--text)';nm.textContent=name;
      const ds=document.createElement('div');ds.style.cssText='font-size:11px;color:var(--sub);margin-top:2px';ds.textContent=desc+' · '+dose;
      left.appendChild(nm);left.appendChild(ds);
      const btn=document.createElement('button');
      btn.style.cssText=`border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0;background:${already?'var(--green-light)':'var(--accent-light)'};color:${already?'var(--green)':'var(--accent)'}`;
      btn.textContent=already?'✓ В списке':'+ Добавить';
      btn.onclick=()=>{
        if(!already){S.mySupps.push({id:Date.now(),name,dose,times:['Утром с едой'],notes:'',taken:{},active:true});saveSupps();render();}
        else openSuppModal(S.mySupps.find(s=>s.name===name));
      };
      row.appendChild(left);row.appendChild(btn);container.appendChild(row);
    });
  }

  return frag;
}

function openSuppModal(supp){
  const existing=document.getElementById('supp-modal-overlay');if(existing)existing.remove();
  const isNew=!supp;
  const data=supp?{...supp,times:[...(supp.times||[])]}:{name:'',dose:'',times:['Утром с едой'],notes:''};

  const overlay=document.createElement('div');overlay.id='supp-modal-overlay';overlay.className='modal-overlay';
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
  const box=document.createElement('div');box.className='modal-box';box.addEventListener('click',e=>e.stopPropagation());

  const hdr=document.createElement('div');hdr.className='modal-hdr';
  hdr.appendChild(Object.assign(document.createElement('div'),{className:'modal-title',textContent:isNew?'💊 Добавить добавку':'✏️ Редактировать'}));
  const cl=document.createElement('button');cl.className='modal-close';cl.textContent='×';cl.onclick=()=>overlay.remove();hdr.appendChild(cl);box.appendChild(hdr);

  // Name
  const ni=document.createElement('input');ni.className='field-inp';ni.placeholder='Название добавки';ni.value=data.name;ni.oninput=e=>data.name=e.target.value;
  const nf=document.createElement('div');nf.className='field';nf.appendChild(Object.assign(document.createElement('div'),{className:'field-lbl',textContent:'НАЗВАНИЕ'}));nf.appendChild(ni);box.appendChild(nf);

  // Dose
  const di=document.createElement('input');di.className='field-inp';di.placeholder='Например: 400 мг';di.value=data.dose;di.oninput=e=>data.dose=e.target.value;
  const df=document.createElement('div');df.className='field';df.appendChild(Object.assign(document.createElement('div'),{className:'field-lbl',textContent:'ДОЗИРОВКА'}));df.appendChild(di);box.appendChild(df);

  // Times
  const tf=document.createElement('div');tf.className='field';
  tf.appendChild(Object.assign(document.createElement('div'),{className:'field-lbl',textContent:'ВРЕМЯ ПРИЁМА'}));
  const tgrid=document.createElement('div');tgrid.style.cssText='display:flex;flex-wrap:wrap;gap:6px';
  SUPP_TIMES.forEach(t=>{
    const btn=document.createElement('button');
    const isA=data.times.includes(t);
    btn.style.cssText=`padding:6px 10px;border-radius:16px;border:1.5px solid ${isA?'var(--accent)':'var(--border)'};background:${isA?'var(--accent-light)':'var(--bg)'};color:${isA?'var(--accent)':'var(--sub)'};font-size:11px;font-weight:${isA?'700':'400'};cursor:pointer;font-family:inherit`;
    btn.textContent=t;
    btn.onclick=()=>{
      if(data.times.includes(t))data.times=data.times.filter(x=>x!==t);else data.times.push(t);
      tgrid.querySelectorAll('button').forEach((b,i)=>{
        const time=SUPP_TIMES[i];const act=data.times.includes(time);
        b.style.borderColor=act?'var(--accent)':'var(--border)';b.style.background=act?'var(--accent-light)':'var(--bg)';b.style.color=act?'var(--accent)':'var(--sub)';b.style.fontWeight=act?'700':'400';
      });
    };
    tgrid.appendChild(btn);
  });
  tf.appendChild(tgrid);box.appendChild(tf);

  // Notes
  const nti=document.createElement('input');nti.className='field-inp';nti.placeholder='Заметки (необязательно)';nti.value=data.notes||'';nti.oninput=e=>data.notes=e.target.value;
  const ntf=document.createElement('div');ntf.className='field';ntf.appendChild(Object.assign(document.createElement('div'),{className:'field-lbl',textContent:'ЗАМЕТКИ'}));ntf.appendChild(nti);box.appendChild(ntf);

  // Save
  const saveBtn=document.createElement('button');saveBtn.className='modal-save';saveBtn.textContent='Сохранить';
  saveBtn.onclick=()=>{
    if(!data.name.trim())return;
    if(isNew){S.mySupps.push({id:Date.now(),...data,taken:{},active:true});}
    else{const idx=S.mySupps.findIndex(s=>s.id===supp.id);if(idx>=0)S.mySupps[idx]={...S.mySupps[idx],...data};}
    saveSupps();overlay.remove();render();
  };
  box.appendChild(saveBtn);
  overlay.appendChild(box);document.body.appendChild(overlay);
}

function rAnalyses(){
  const frag=document.createDocumentFragment();

  const hdr=document.createElement('div');hdr.className='section-header';
  hdr.appendChild(Object.assign(document.createElement('div'),{className:'section-title',textContent:'🩺 Медицинские анализы'}));
  const addBtn=document.createElement('button');addBtn.className='add-btn';addBtn.textContent='+ Добавить';

  const hint=document.createElement('div');
  hint.style.cssText='background:var(--accent-light);border:1px solid #bfdbfe;border-radius:10px;padding:10px 13px;margin-bottom:14px;font-size:12px;color:var(--accent);line-height:1.5';
  hint.textContent='📷 Сфотографируй бланк анализов — AI прочитает показатели и даст комментарий с учётом твоих диагнозов и лекарств';
  frag.appendChild(hint);

  if(!S.analyses.length){
    const empty=document.createElement('div');empty.className='empty';
    empty.innerHTML='<div style="font-size:36px;margin-bottom:10px">🔬</div><div>Анализов пока нет</div><div style="font-size:12px;color:var(--muted);margin-top:6px">Добавь первый анализ чтобы отслеживать динамику</div>';
    frag.appendChild(empty);return frag;
  }

  S.analyses.slice().reverse().forEach(an=>{
    const card=document.createElement('div');
    card.style.cssText='background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px 14px;margin-bottom:10px;box-shadow:var(--shadow)';

    const row=document.createElement('div');row.style.cssText='display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px';
    const left=document.createElement('div');
    const title=document.createElement('div');title.style.cssText='font-size:14px;font-weight:700;color:var(--text)';title.textContent=an.title||'Анализы';
    const date=document.createElement('div');date.style.cssText='font-size:11px;color:var(--muted);margin-top:2px';date.textContent=fmtShort(an.date);
    left.appendChild(title);left.appendChild(date);
    const acts=document.createElement('div');acts.style.cssText='display:flex;gap:5px';
    const delBtn=document.createElement('button');delBtn.className='icon-btn';delBtn.style.cssText='background:var(--red-light);color:var(--red)';delBtn.textContent='×';
    delBtn.onclick=()=>{S.analyses=S.analyses.filter(x=>x.id!==an.id);saveAnalyses();render();};
    acts.appendChild(delBtn);row.appendChild(left);row.appendChild(acts);card.appendChild(row);

    // Raw text preview
    if(an.text){
      const txt=document.createElement('div');txt.style.cssText='font-size:12px;color:var(--sub);background:var(--bg);border-radius:8px;padding:8px 10px;margin-bottom:8px;max-height:80px;overflow:hidden;white-space:pre-wrap';
      txt.textContent=an.text.substring(0,300)+(an.text.length>300?'...':'');card.appendChild(txt);
    }

    // AI comment
    if(an.aiComment){
      const aiBox=document.createElement('div');aiBox.style.cssText='background:var(--accent-light);border-radius:8px;padding:9px 11px;border-left:3px solid var(--accent)';
      const aiTitle=document.createElement('div');aiTitle.style.cssText='font-size:11px;font-weight:700;color:var(--accent);margin-bottom:4px';aiTitle.textContent='🤖 AI Комментарий:';
      const aiText=document.createElement('div');aiText.style.cssText='font-size:12px;color:var(--text);line-height:1.5;white-space:pre-wrap';aiText.textContent=an.aiComment;
      aiBox.appendChild(aiTitle);aiBox.appendChild(aiText);card.appendChild(aiBox);
    } else {
      const aiBtn=document.createElement('button');
      aiBtn.style.cssText='width:100%;padding:8px;background:var(--purple-light);border:1px solid #ddd6fe;border-radius:8px;color:var(--purple);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px';
      aiBtn.textContent='🤖 Запросить AI анализ';
      aiBtn.onclick=()=>requestAnalysisAI(an);card.appendChild(aiBtn);
    }
    frag.appendChild(card);
  });
  return frag;
}

function openAnalysisModal(){
  const existing=document.getElementById('analysis-modal-overlay');if(existing)existing.remove();
  const data={title:'',date:today(),text:'',scanning:false,scanErr:''};

  const overlay=document.createElement('div');overlay.id='analysis-modal-overlay';overlay.className='modal-overlay';
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
  const box=document.createElement('div');box.className='modal-box';box.addEventListener('click',e=>e.stopPropagation());

  const hdr=document.createElement('div');hdr.className='modal-hdr';
  hdr.appendChild(Object.assign(document.createElement('div'),{className:'modal-title',textContent:'🩺 Добавить анализы'}));
  const cl=document.createElement('button');cl.className='modal-close';cl.textContent='×';cl.onclick=()=>overlay.remove();hdr.appendChild(cl);box.appendChild(hdr);

  // Title
  const ti=document.createElement('input');ti.className='field-inp';ti.placeholder='Например: ОАК, Биохимия, МНО';ti.value=data.title;ti.oninput=e=>data.title=e.target.value;
  const tf=document.createElement('div');tf.className='field';tf.appendChild(Object.assign(document.createElement('div'),{className:'field-lbl',textContent:'НАЗВАНИЕ'}));tf.appendChild(ti);box.appendChild(tf);

  // Date
  const di=document.createElement('input');di.className='field-inp';di.type='date';di.value=data.date;di.max=today();di.oninput=e=>data.date=e.target.value;
  const df=document.createElement('div');df.className='field';df.appendChild(Object.assign(document.createElement('div'),{className:'field-lbl',textContent:'ДАТА АНАЛИЗОВ'}));df.appendChild(di);box.appendChild(df);

  // Photo + text area
  const pf=document.createElement('div');pf.className='field';
  pf.appendChild(Object.assign(document.createElement('div'),{className:'field-lbl',textContent:'ДАННЫЕ АНАЛИЗОВ'}));

  const camRow=document.createElement('div');camRow.style.cssText='display:flex;gap:8px;margin-bottom:8px';
  const camInp=document.createElement('input');camInp.type='file';camInp.accept='image/*';camInp.style.display='none';
  const statusDiv=document.createElement('div');statusDiv.style.cssText='font-size:11px;color:var(--sub);margin-top:4px';statusDiv.textContent='Сфотографируй бланк или введи вручную';

  camInp.onchange=async e=>{
    const file=e.target.files?.[0];if(!file)return;e.target.value='';
    statusDiv.style.color='var(--purple)';statusDiv.textContent='🔍 Читаю анализы...';camBtn.disabled=true;camBtn.textContent='⏳';
    const reader=new FileReader();
    reader.onload=async()=>{
      try{
        const b64=reader.result.split(',')[1];
        const txt=await aiCall([{role:'user',content:[
          {type:'image_url',image_url:{url:'data:image/jpeg;base64,'+b64}},
          {type:'text',text:'Прочитай медицинский анализ на фото. Выпиши все показатели с их значениями и единицами измерения. Формат: "Показатель: значение единица (норма: диапазон)". Одна строка — один показатель.'}
        ]}], 800);
        if(txt){textarea.value=txt;data.text=txt;statusDiv.style.color='var(--green)';statusDiv.textContent='✅ Показатели прочитаны — проверь и исправь если нужно';}
        else throw new Error();
      }catch{statusDiv.style.color='var(--red)';statusDiv.textContent='Не удалось прочитать — введи вручную';}
      camBtn.disabled=false;camBtn.textContent='📷 Фото';
    };
    reader.readAsDataURL(file);
  };

  const camBtn=document.createElement('button');
  camBtn.style.cssText='background:var(--purple);border:none;border-radius:9px;padding:10px 14px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap';
  camBtn.textContent='📷 Фото';camBtn.onclick=()=>camInp.click();
  camRow.appendChild(camBtn);camRow.appendChild(camInp);pf.appendChild(camRow);

  const textarea=document.createElement('textarea');
  textarea.className='field-inp';textarea.placeholder='Гемоглобин: 145 г/л (норма: 130–160)\nЛейкоциты: 6.5 тыс/мкл\nМНО: 2.3\n...';
  textarea.style.cssText='height:120px;resize:vertical;font-size:13px;line-height:1.5';
  textarea.oninput=e=>data.text=e.target.value;
  pf.appendChild(textarea);pf.appendChild(statusDiv);box.appendChild(pf);

  const saveBtn=document.createElement('button');saveBtn.className='modal-save';saveBtn.textContent='Сохранить';
  saveBtn.onclick=()=>{
    if(!data.text.trim()&&!data.title.trim())return;
    S.analyses.push({id:Date.now(),date:data.date,title:data.title||'Анализы',text:data.text,aiComment:''});
    saveAnalyses();overlay.remove();render();
    // Auto-request AI comment
    setTimeout(()=>requestAnalysisAI(S.analyses[S.analyses.length-1]),300);
  };
  box.appendChild(saveBtn);
  overlay.appendChild(box);document.body.appendChild(overlay);
}

АНАЛИЗЫ (${an.title}, ${fmtDate(an.date)}):
${an.text}

Дай анализ по структуре:

function renderAuth(){
  const wrap=document.createElement('div');
  wrap.style.cssText='min-height:100vh;background:linear-gradient(160deg,#1a2a4a 0%,#2563eb 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px';

  // Состояние формы
  const state={mode:'login',email:'',password:'',name:'',loading:false,error:'',success:''};

  function rebuild(){
    wrap.innerHTML='';

    // Лого
    const logo=document.createElement('div');
    logo.style.cssText='text-align:center;margin-bottom:32px';
    logo.innerHTML='<div style="font-size:60px;margin-bottom:12px">💪</div><div style="font-size:28px;font-weight:800;color:#fff;margin-bottom:6px">Фитнес Дневник</div><div style="font-size:14px;color:rgba(255,255,255,.6)">Персональный AI тренер</div>';
    wrap.appendChild(logo);

    // Карточка формы
    const card=document.createElement('div');
    card.style.cssText='background:#fff;border-radius:20px;padding:24px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3)';

    // Переключатель Вход/Регистрация
    const tabs=document.createElement('div');
    tabs.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:4px;background:#f0f4f8;border-radius:10px;padding:4px;margin-bottom:20px';
    ['login','signup'].forEach(mode=>{
      const btn=document.createElement('button');
      const isA=state.mode===mode;
      btn.style.cssText=`padding:10px;border-radius:8px;border:none;font-size:14px;font-weight:${isA?'700':'400'};cursor:pointer;font-family:inherit;background:${isA?'#fff':'transparent'};color:${isA?'#2563eb':'#5a6a80'};box-shadow:${isA?'0 2px 8px rgba(0,0,0,.1)':'none'};transition:all .2s`;
      btn.textContent=mode==='login'?'Войти':'Регистрация';
      btn.onclick=()=>{state.mode=mode;state.error='';state.success='';rebuild();};
      tabs.appendChild(btn);
    });
    card.appendChild(tabs);

    // Ошибка
    if(state.error){
      const err=document.createElement('div');
      err.style.cssText='background:#fff1f1;border:1px solid #fecaca;border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:13px;color:#dc2626;line-height:1.4';
      err.textContent=state.error;card.appendChild(err);
    }

    // Успех
    if(state.success){
      const ok=document.createElement('div');
      ok.style.cssText='background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:13px;color:#16a34a;line-height:1.4';
      ok.textContent=state.success;card.appendChild(ok);
    }

    // Поле Имя (только регистрация)
    if(state.mode==='signup'){
      const nf=document.createElement('div');nf.style.marginBottom='12px';
      const nl=document.createElement('div');nl.style.cssText='font-size:11px;color:#5a6a80;font-weight:700;margin-bottom:4px;letter-spacing:.5px';nl.textContent='ИМЯ';
      const ni=document.createElement('input');ni.type='text';ni.placeholder='Как тебя зовут?';ni.value=state.name;
      ni.style.cssText='width:100%;background:#f0f4f8;border:1.5px solid #dde3ea;border-radius:9px;padding:12px;font-size:15px;font-family:inherit;outline:none;color:#1e2d42';
      ni.oninput=e=>state.name=e.target.value;
      ni.onfocus=e=>e.target.style.borderColor='#2563eb';
      ni.onblur=e=>e.target.style.borderColor='#dde3ea';
      nf.appendChild(nl);nf.appendChild(ni);card.appendChild(nf);
    }

    // Email
    const ef=document.createElement('div');ef.style.marginBottom='12px';
    const el=document.createElement('div');el.style.cssText='font-size:11px;color:#5a6a80;font-weight:700;margin-bottom:4px;letter-spacing:.5px';el.textContent='EMAIL';
    const ei=document.createElement('input');ei.type='email';ei.placeholder='example@mail.ru';ei.value=state.email;
    ei.style.cssText='width:100%;background:#f0f4f8;border:1.5px solid #dde3ea;border-radius:9px;padding:12px;font-size:15px;font-family:inherit;outline:none;color:#1e2d42';
    ei.oninput=e=>state.email=e.target.value;
    ei.onfocus=e=>e.target.style.borderColor='#2563eb';
    ei.onblur=e=>e.target.style.borderColor='#dde3ea';
    ef.appendChild(el);ef.appendChild(ei);card.appendChild(ef);

    // Пароль
    const pf=document.createElement('div');pf.style.marginBottom='20px';
    const pl=document.createElement('div');pl.style.cssText='font-size:11px;color:#5a6a80;font-weight:700;margin-bottom:4px;letter-spacing:.5px';pl.textContent='ПАРОЛЬ';
    const pi=document.createElement('input');pi.type='password';pi.placeholder='Минимум 6 символов';pi.value=state.password;
    pi.style.cssText='width:100%;background:#f0f4f8;border:1.5px solid #dde3ea;border-radius:9px;padding:12px;font-size:15px;font-family:inherit;outline:none;color:#1e2d42';
    pi.oninput=e=>state.password=e.target.value;
    pi.onfocus=e=>e.target.style.borderColor='#2563eb';
    pi.onblur=e=>e.target.style.borderColor='#dde3ea';
    // Enter для отправки
    pi.onkeydown=e=>{if(e.key==='Enter')submitBtn.click();};
    pf.appendChild(pl);pf.appendChild(pi);card.appendChild(pf);

    // Кнопка submit
    const submitBtn=document.createElement('button');
    submitBtn.style.cssText='width:100%;padding:14px;background:#2563eb;border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .2s';
    submitBtn.textContent=state.loading?'⏳ Загрузка...':(state.mode==='login'?'Войти →':'Создать аккаунт →');
    submitBtn.disabled=state.loading;
    submitBtn.onclick=async()=>{
      if(!state.email||!state.password){state.error='Заполни все поля';rebuild();return;}
      if(state.password.length<6){state.error='Пароль минимум 6 символов';rebuild();return;}
      state.loading=true;state.error='';rebuild();
      try{
        if(state.mode==='login'){
          const d=await sbSignIn(state.email,state.password);
          if(d.access_token){
            localStorage.setItem('sb_session',JSON.stringify(d));
            currentUser={...d.user,access_token:d.access_token,refresh_token:d.refresh_token,id:d.user.id};
            // Загружаем данные из облака
            load();
            const loaded=await cloudLoad();
            render();
          } else {
            state.error='Неверный email или пароль';
          }
        } else {
          const d=await sbSignUp(state.email,state.password,state.name);
          if(d.user||d.id){
            state.success='✅ Аккаунт создан! Проверь email для подтверждения, затем войди.';
            state.mode='login';
          } else if(d.error_description||d.msg){
            state.error=d.error_description||d.msg;
          } else {
            state.error='Ошибка регистрации. Попробуй снова.';
          }
        }
      }catch(e){
        console.error(e);
        state.error=e.message||'Ошибка соединения. Проверь интернет.';
      }
      state.loading=false;rebuild();
    };
    card.appendChild(submitBtn);

    // Подсказка
    const hint=document.createElement('div');
    hint.style.cssText='text-align:center;margin-top:14px;font-size:12px;color:#8a9ab0';
    hint.textContent=state.mode==='login'?'Нет аккаунта? Нажми «Регистрация»':'Уже есть аккаунт? Нажми «Войти»';
    card.appendChild(hint);

    // Разделитель
    const divider=document.createElement('div');
    divider.style.cssText='display:flex;align-items:center;gap:10px;margin:16px 0';
    divider.innerHTML='<div style="flex:1;height:1px;background:#dde3ea"></div><span style="font-size:12px;color:#8a9ab0">или</span><div style="flex:1;height:1px;background:#dde3ea"></div>';
    card.appendChild(divider);

    // Кнопка гостевого входа
    const guestBtn=document.createElement('button');
    guestBtn.style.cssText='width:100%;padding:12px;background:var(--bg,#f0f4f8);border:2px dashed #dde3ea;border-radius:12px;color:#5a6a80;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:10px';
    guestBtn.textContent='👀 Посмотреть без регистрации';
    guestBtn.onclick=()=>{
      setGuest();
      load();
      render();
    };
    card.appendChild(guestBtn);

    // Предупреждение о госте
    const guestInfo=document.createElement('div');
    guestInfo.style.cssText='background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:10px 12px;font-size:12px;color:#92400e;line-height:1.5;text-align:center';
    guestInfo.innerHTML='⏰ <b>Гостевой доступ 24 часа</b><br>Данные сохраняются только на этом устройстве.<br>Для составления AI плана нужна регистрация.';
    card.appendChild(guestInfo);

    wrap.appendChild(card);

    // Фокус на email
    setTimeout(()=>ei.focus(),100);
  }

  rebuild();
  return wrap;
}

function renderOnboarding(){
  const wrap=document.createElement('div');
  wrap.style.cssText='min-height:100vh;background:var(--header);display:flex;flex-direction:column';

  // Данные опроса
  const form={
    name:'',age:'',weight:'',height:'',gender:'мужской',
    goal:'',level:'',daysPerWeek:'',sessionTime:'',
    equipment:'',healthNotes:'',
    step:0
  };

  const STEPS=[
    {id:'welcome'},
    {id:'personal', title:'Расскажи о себе', fields:['name','age','gender','weight','height']},
    {id:'goal',     title:'Твоя цель',       fields:['goal']},
    {id:'level',    title:'Опыт и время',    fields:['level','daysPerWeek','sessionTime']},
    {id:'equip',    title:'Оборудование',    fields:['equipment']},
    {id:'health',   title:'Здоровье',        fields:['healthNotes']},
    {id:'generating'},
  ];

  function rebuild(){
    wrap.innerHTML='';
    // Всегда убираем кнопки навигации при перестройке
    const oldNav=document.getElementById('onboard-nav');
    if(oldNav)oldNav.remove();

    const step=STEPS[form.step];
    if(step.id==='welcome'){
      renderWelcome(wrap,form,rebuild);
    } else if(step.id==='generating'){
      renderGenerating(wrap,form);
    } else {
      renderStep(wrap,form,STEPS,rebuild);
    }
  }
  rebuild();
  return wrap;
}

  if(form.step>1){
    const backBtn=document.createElement('button');

    backBtn.textContent='← Назад';backBtn.onclick=()=>{form.step--;rebuild();};
    nav.appendChild(backBtn);
  }

  const nextBtn=document.createElement('button');
  nextBtn.style.cssText='flex:1;padding:14px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit';
  const isLast=form.step===STEPS.length-2;
  nextBtn.textContent=isLast?'Составить план 🚀':'Далее →';
  nextBtn.onclick=()=>{
    if(isLast){
      // Убираем кнопки навигации ПЕРЕД показом экрана генерации
      nav.remove();

function saveProfileAndRender(form){

  const title=document.createElement('div');

  const msgs=['Анализирую твои данные...','Учитываю состояние здоровья...','Подбираю оптимальную нагрузку...','Рассчитываю КБЖУ...','Формирую расписание тренировок...'];

  stepEl.style.cssText='font-size:14px;color:rgba(255,255,255,.7);animation:pulse 2s infinite;margin-bottom:32px';
  let idx=0;
  const interval=setInterval(()=>{idx=(idx+1)%msgs.length;stepEl.textContent=msgs[idx];},1800);
  stepEl.textContent=msgs[0];

  // Обратный отсчёт
  const countdown=document.createElement('div');
  countdown.style.cssText='font-size:12px;color:rgba(255,255,255,.5);margin-top:12px';

    secs--;

  },1000);

  function doSkip(){
    clearInterval(interval);
    clearInterval(cdInt);
    saveProfileAndRender(form);

  // Автовыход через 25 сек
  const autoTimer=setTimeout(doSkip,25000);

  // Кнопка пропустить

  wrap.appendChild(spinner);

  wrap.appendChild(stepEl);
  wrap.appendChild(skipBtn);
  wrap.appendChild(countdown);
}

async function generateAIPlan(form){
  const prompt=`Ты персональный тренер и диетолог. Составь персональный план для пользователя.

ДАННЫЕ:
- Имя: ${form.name||'не указано'}, ${form.age} лет, ${form.gender}
- Вес: ${form.weight} кг, рост: ${form.height} см
- Цель: ${form.goal}
- Уровень: ${form.level}
- Тренировок в неделю: ${form.daysPerWeek}
- Длительность: ${form.sessionTime}
- Оборудование: ${form.equipment}
- Ограничения здоровья: ${form.healthNotes||'нет'}

Ответь ТОЛЬКО валидным JSON без markdown:
{
  "calories": 2100,
  "protein": 140,
  "fat": 70,
  "carbs": 200,
  "goal_text": "Краткий анализ цели и прогноз на 3 месяца (2-3 предложения)",
  "nutrition_tips": ["совет 1","совет 2","совет 3"],
  "progression": "Как увеличивать нагрузку каждые 2 недели",
  "warnings": "Предупреждения по здоровью и противопоказания",
  "schedule": {
    "Понедельник": {
      "name": "Название тренировки",
      "exercises": ["Упражнение 1 — 3×12","Упражнение 2 — 4×10","Упражнение 3 — 3×15"],
      "duration": "60 мин",
      "notes": "Пояснение к тренировке"
    },
    "Вторник": { "name": "Отдых", "exercises": [], "duration": "", "notes": "Активное восстановление, растяжка" },
    "Среда": { ... },
    "Четверг": { ... },
    "Пятница": { ... },
    "Суббота": { ... },
    "Воскресенье": { "name": "Отдых", "exercises": [], "duration": "", "notes": "" }
  }
}

ВАЖНО: упражнения подбирай строго под оборудование (${form.equipment}) и с учётом ограничений здоровья. Количество тренировочных дней = ${form.daysPerWeek}, остальные дни = отдых.`;

  try{
    const raw=await aiCall([{role:'user',content:prompt}], 2000);
    const planJSON=JSON.parse(raw.replace(/```json|```/g,'').trim());

    // Update macros
    S.data.profile.calorieGoal=planJSON.calories||2100;
    S.data.profile.proteinGoal=planJSON.protein||140;
    S.data.profile.fatGoal=planJSON.fat||70;
    S.data.profile.carbGoal=planJSON.carbs||200;

    // Build WT from schedule — replace default templates with personalized ones
    if(planJSON.schedule){
      const newWT={};
      Object.entries(planJSON.schedule).forEach(([day,info])=>{
        if(info.exercises&&info.exercises.length>0){
          const key=`${info.name} (${day})`;
          newWT[key]=info.exercises.map(e=>{
            // Strip "— 3×12" part for exercise name
            return e.split('—')[0].split(' — ')[0].trim();
          });
        }
      });
      // If we got workout templates from AI, update WT
      if(Object.keys(newWT).length>0){
        // Add personalized templates to WT (keep existing as fallback)
        Object.assign(WT, newWT);
      }
    }

    // Save full plan data
    S.userProfile={
      name:form.name,age:+form.age,gender:form.gender,
      weight:+form.weight,height:+form.height,
      goal:form.goal,level:form.level,
      daysPerWeek:+form.daysPerWeek,sessionTime:form.sessionTime,
      equipment:form.equipment,healthNotes:form.healthNotes,
      createdAt:today()
    };
    S.aiPlan=planJSON; // store structured JSON

    // Add starting weight
    if(form.weight&&!S.weights.find(x=>x.date===today())){
      S.weights.push({date:today(),kg:+form.weight});
      S.weights.sort((a,b)=>a.date.localeCompare(b.date));
      saveW();
    }

    saveProfile();save();
    document.getElementById('app').innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px"><div style="width:40px;height:40px;border:3px solid #dde3ea;border-top-color:#2563eb;border-radius:50%;animation:spin 1s linear infinite"></div><div style="color:#5a6a80;font-size:14px">Загружаю дневник...</div></div>';
    setTimeout(()=>render(),200);

  }catch(err){
    console.error('Plan generation error:',err);

    // Сохраняем профиль в любом случае
    S.userProfile={
      name:form.name,age:+form.age,gender:form.gender,
      weight:+form.weight,height:+form.height,
      goal:form.goal,level:form.level,
      daysPerWeek:+form.daysPerWeek,sessionTime:form.sessionTime,
      equipment:form.equipment,healthNotes:form.healthNotes,
      createdAt:today()
    };
    S.aiPlan=null;

    // Рассчитываем КБЖУ по формуле Миффлина (без AI)
    const w=+form.weight,ht=+form.height,a=+form.age;
    const bmr=form.gender==='мужской'?(10*w+6.25*ht-5*a+5):(10*w+6.25*ht-5*a-161);
    const tdee=Math.round(bmr*1.55);
    S.data.profile.calorieGoal=form.goal==='Похудение'?tdee-500:form.goal==='Набор мышечной массы'?tdee+300:tdee;
    S.data.profile.proteinGoal=Math.round(w*1.8);
    S.data.profile.fatGoal=Math.round(S.data.profile.calorieGoal*0.25/9);
    S.data.profile.carbGoal=Math.round((S.data.profile.calorieGoal-S.data.profile.proteinGoal*4-S.data.profile.fatGoal*9)/4);

    if(form.weight&&!S.weights.find(x=>x.date===today())){
      S.weights.push({date:today(),kg:+form.weight});saveW();
    }
    saveProfile();save();
    document.getElementById('app').innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px"><div style="width:40px;height:40px;border:3px solid #dde3ea;border-top-color:#2563eb;border-radius:50%;animation:spin 1s linear infinite"></div><div style="color:#5a6a80;font-size:14px">Загружаю дневник...</div></div>';
    setTimeout(()=>render(),200);

    // Показываем объяснение почему не сгенерировался план
    setTimeout(()=>{
      const isNoKey=err.message==='NO_KEY';
      const isTimeout=err.message==='TIMEOUT';
      const msg=isNoKey
        ?'Профиль сохранён! КБЖУ рассчитаны по формуле.\n\nДля AI плана тренировок нужен ключ Groq — нажми ⚙️ в шапке.'
        :isTimeout
        ?'Профиль сохранён! КБЖУ рассчитаны.\n\nAI не ответил за 20 секунд — нет интернета или неверный ключ.\nМожно запросить план позже во вкладке «📋 Мой план».'
        :'Профиль сохранён! КБЖУ рассчитаны по формуле.\n\nAI план не удалось получить: '+err.message;
      alert(msg);
    },300);
  }
}

  const editBtn=document.createElement('button');
  editBtn.style.cssText='width:100%;padding:11px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:16px';
  editBtn.textContent='✏️ Изменить профиль и пересоставить план';
  editBtn.onclick=()=>{if(confirm('Пересоставить план? Данные дневника сохранятся.')){S.userProfile=null;S.aiPlan=null;saveProfile();render();}};
  frag.appendChild(editBtn);

  if(!plan){
    const noplan=document.createElement('div');noplan.style.cssText='text-align:center;padding:30px 20px';
    noplan.innerHTML='<div style="font-size:40px;margin-bottom:12px">📋</div><div style="font-size:14px;color:var(--muted);margin-bottom:16px">AI план не был получен.<br>Возможно не было ключа Groq или нет интернета.</div>';
    // Кнопка повторного запроса
    if(p){
      const retryBtn=document.createElement('button');
      retryBtn.style.cssText='width:100%;padding:13px;background:var(--accent);border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:8px';
      retryBtn.textContent='🤖 Запросить план сейчас';
      retryBtn.onclick=()=>{
        if(!getAIKey()){openAISettings();return;}
        // Показываем загрузку
        retryBtn.disabled=true;retryBtn.textContent='⏳ Составляю план...';
        generateAIPlan(p).catch(()=>{retryBtn.disabled=false;retryBtn.textContent='🤖 Запросить план сейчас';});
      };
      noplan.appendChild(retryBtn);
    }
    const editBtn2=document.createElement('button');
    editBtn2.style.cssText='width:100%;padding:11px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;cursor:pointer;font-family:inherit';
    editBtn2.textContent='✏️ Пройти опрос заново';
    editBtn2.onclick=()=>{if(confirm('Пройти опрос заново?')){S.userProfile=null;S.aiPlan=null;saveProfile();render();}};
    noplan.appendChild(editBtn2);
    frag.appendChild(noplan);return frag;
  }

  // ── Macros card ──
  if(plan.calories){
    const mac=document.createElement('div');
    mac.style.cssText='background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow)';
    mac.innerHTML=`<div style="font-size:13px;font-weight:700;color:var(--accent);margin-bottom:10px">🍽️ ТВОИ НОРМЫ ПИТАНИЯ</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;text-align:center">
      <div style="background:var(--orange-light);border-radius:8px;padding:8px"><div style="font-size:20px;font-weight:700;color:var(--orange)">${plan.calories}</div><div style="font-size:10px;color:var(--muted)">ккал</div></div>
      <div style="background:var(--green-light);border-radius:8px;padding:8px"><div style="font-size:20px;font-weight:700;color:var(--green)">${plan.protein}г</div><div style="font-size:10px;color:var(--muted)">белок</div></div>
      <div style="background:var(--pink-light);border-radius:8px;padding:8px"><div style="font-size:20px;font-weight:700;color:var(--pink)">${plan.fat}г</div><div style="font-size:10px;color:var(--muted)">жиры</div></div>
      <div style="background:var(--yellow-light);border-radius:8px;padding:8px"><div style="font-size:20px;font-weight:700;color:var(--yellow)">${plan.carbs}г</div><div style="font-size:10px;color:var(--muted)">углев</div></div>
    </div>`;
    frag.appendChild(mac);
  }

  // ── Goal text ──
  if(plan.goal_text){
    const gc=document.createElement('div');
    gc.style.cssText='background:var(--card);border:1px solid var(--border);border-left:4px solid var(--accent);border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow)';
    gc.innerHTML=`<div style="font-size:13px;font-weight:700;color:var(--accent);margin-bottom:6px">🎯 ТВОЯ ЦЕЛЬ</div><div style="font-size:13px;color:var(--text);line-height:1.6">${plan.goal_text}</div>`;
    frag.appendChild(gc);
  }

  // ── Weekly schedule ──
  if(plan.schedule){
    const sh=document.createElement('div');sh.className='section-header';
    sh.appendChild(Object.assign(document.createElement('div'),{className:'section-title',textContent:'📅 Расписание тренировок'}));
    frag.appendChild(sh);

    const days=['Понедельник','Вторник','Среда','Четверг','Пятница','Суббота','Воскресенье'];
    const dayShort=['ПН','ВТ','СР','ЧТ','ПТ','СБ','ВС'];

    days.forEach((day,i)=>{
      const info=plan.schedule[day];
      if(!info)return;
      const isRest=!info.exercises||info.exercises.length===0;

      const card=document.createElement('div');
      card.style.cssText=`background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px 14px;margin-bottom:8px;box-shadow:var(--shadow);${isRest?'opacity:.6':''}`;

      const hdr=document.createElement('div');hdr.style.cssText='display:flex;align-items:center;gap:10px;margin-bottom:isRest?0:8px';
      const dayBadge=document.createElement('div');
      dayBadge.style.cssText=`width:36px;height:36px;border-radius:50%;background:${isRest?'var(--bg)':'var(--accent)'};color:${isRest?'var(--muted)':'#fff'};font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0`;
      dayBadge.textContent=dayShort[i];
      const dayInfo=document.createElement('div');
      const dayName=document.createElement('div');dayName.style.cssText='font-size:14px;font-weight:700;color:var(--text)';
      dayName.textContent=info.name||day;
      const dayMeta=document.createElement('div');dayMeta.style.cssText='font-size:11px;color:var(--sub);margin-top:1px';
      dayMeta.textContent=info.duration?day+' · '+info.duration:day;
      dayInfo.appendChild(dayName);dayInfo.appendChild(dayMeta);
      hdr.appendChild(dayBadge);hdr.appendChild(dayInfo);

      // "Start workout" button for training days
      if(!isRest){
        const startBtn=document.createElement('button');
        startBtn.style.cssText='margin-left:auto;background:var(--accent);border:none;border-radius:8px;padding:6px 12px;color:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0';
        startBtn.textContent='▶ Начать';
        startBtn.onclick=()=>{
          // Add this workout to today
          const exercises=info.exercises.map(e=>e.split('—')[0].split(' — ')[0].trim());
          const wName=info.name||day;
          // Add to WT if not there
          if(!WT[wName])WT[wName]=exercises;
          S.workoutModal={
            editing:null,mode:'plan',
            form:{type:wName,notes:'',duration:info.duration?.replace(/\D/g,'')||'60',pulse:'',name:''},
            customExercises:[]
          };
          S.tab='today';
          buildWorkoutModal();
          render();
        };
        hdr.appendChild(startBtn);
      }
      card.appendChild(hdr);

      if(!isRest&&info.exercises&&info.exercises.length>0){
        const exList=document.createElement('div');exList.style.cssText='margin-top:8px';
        info.exercises.forEach((ex,idx)=>{
          const row=document.createElement('div');
          row.style.cssText='display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--text)';
          const num=document.createElement('div');num.style.cssText='width:18px;height:18px;border-radius:50%;background:var(--accent-light);color:var(--accent);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0';
          num.textContent=idx+1;
          const name=document.createElement('span');name.textContent=ex;
          row.appendChild(num);row.appendChild(name);exList.appendChild(row);
        });
        card.appendChild(exList);
      }

      if(info.notes&&isRest){
        const nt=document.createElement('div');nt.style.cssText='font-size:11px;color:var(--muted);margin-top:4px;font-style:italic';nt.textContent=info.notes;card.appendChild(nt);
      }
      frag.appendChild(card);
    });
  }

  // ── Nutrition tips ──
  if(plan.nutrition_tips&&plan.nutrition_tips.length){
    const nc=document.createElement('div');
    nc.style.cssText='background:var(--card);border:1px solid var(--border);border-left:4px solid var(--green);border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow)';
    nc.innerHTML=`<div style="font-size:13px;font-weight:700;color:var(--green);margin-bottom:8px">🥗 СОВЕТЫ ПО ПИТАНИЮ</div>`;
    plan.nutrition_tips.forEach(tip=>{
      const t=document.createElement('div');t.style.cssText='font-size:13px;color:var(--text);padding:4px 0;border-bottom:1px solid var(--border);line-height:1.5';
      t.textContent='• '+tip;nc.appendChild(t);
    });
    frag.appendChild(nc);
  }

  // ── Progression ──
  if(plan.progression){
    const pc=document.createElement('div');
    pc.style.cssText='background:var(--card);border:1px solid var(--border);border-left:4px solid var(--teal);border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow)';
    pc.innerHTML=`<div style="font-size:13px;font-weight:700;color:var(--teal);margin-bottom:6px">📈 ПРОГРЕССИЯ</div><div style="font-size:13px;color:var(--text);line-height:1.6">${plan.progression}</div>`;
    frag.appendChild(pc);
  }

  // ── Warnings ──
  if(plan.warnings){
    const wc=document.createElement('div');
    wc.style.cssText='background:var(--yellow-light);border:1px solid #fde68a;border-left:4px solid var(--yellow);border-radius:12px;padding:14px;margin-bottom:12px';
    wc.innerHTML=`<div style="font-size:13px;font-weight:700;color:var(--yellow);margin-bottom:6px">⚠️ ВАЖНО</div><div style="font-size:13px;color:var(--text);line-height:1.6">${plan.warnings}</div>`;
    frag.appendChild(wc);
  }

  return frag;
}

function regSW(){if(!('serviceWorker'in navigator))return;const code=`self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>clients.claim());self.addEventListener('fetch',e=>{if(e.request.method!=='GET')return;e.respondWith(caches.open('fit-v7').then(async c=>{const cached=await c.match(e.request);if(cached)return cached;try{const r=await fetch(e.request);if(e.request.url.startsWith(location.origin))c.put(e.request,r.clone());return r;}catch{return cached||new Response('Offline');}}));});`;navigator.serviceWorker.register(URL.createObjectURL(new Blob([code],{type:'application/javascript'}))).catch(()=>{});}
// ── ЗАПУСК ──
async function startup(){
  const app=document.getElementById('app');
  app.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px"><div style="width:48px;height:48px;border:3px solid #dde3ea;border-top-color:#2563eb;border-radius:50%;animation:spin 1s linear infinite"></div><div style="font-size:14px;color:#5a6a80">Загрузка...</div></div><style>@keyframes spin{to{transform:rotate(360deg)}}</style>';

  try{
    load();
    const loggedIn=await initAuth();
    if(loggedIn){
      try{ await cloudLoad(); }catch(e){ console.warn('Cloud load failed:',e); }
    }
  }catch(e){
    console.error('Startup error:',e);
  }

  // Загружаем базы из Supabase (фоново)
  loadFoodsDB();
  loadExercisesDB();

  render();
  try{ regSW(); }catch(e){}
}

startup();
</script>
</body>
</html>
